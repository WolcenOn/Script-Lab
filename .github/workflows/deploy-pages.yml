name: Publicar Script-Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: script-lab-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar sitio estático
        run: |
          mkdir -p _site
          cp -R prototype _site/prototype
          cp README.md _site/README.md
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Script-Lab</title>
            <meta http-equiv="refresh" content="0; url=prototype/">
          </head>
          <body>
            <p>Abriendo <a href="prototype/">Script-Lab prototype</a>...</p>
          </body>
          </html>
          HTML

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
