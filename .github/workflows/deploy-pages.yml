name: Publicar Script-Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: script-lab-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar artefacto estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
